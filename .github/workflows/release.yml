name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Resolve Release Metadata
        id: version
        run: |
          # Grab the version from build.zig.zon.
          base_version="$(sed -n 's/^[[:space:]]*\.version = "\(.*\)",/\1/p' build.zig.zon | head -n1)"
          if [ -z "$base_version" ]; then
            echo "Failed to parse version from build.zig.zon" >&2
            exit 1
          fi

          # If triggered by a new tag.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            expected_tag="v${base_version}"
            actual_tag="${GITHUB_REF_NAME}"

            if [ "$actual_tag" != "$expected_tag" ]; then
              echo "Tag/version mismatch. build.zig.zon has ${base_version}, expected tag ${expected_tag}, got ${actual_tag}" >&2
              exit 1
            fi

            release_tag="${actual_tag}"
            prerelease="false"
            test_build_args="-Dnix -Drelease-version -Dignore-version-check"
            release_build_args="-Drelease-version -Dignore-version-check"
          else
            release_tag="nightly"
            prerelease="true"
            test_build_args="-Dnix"
            release_build_args=""
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "test_build_args=${test_build_args}" >> "$GITHUB_OUTPUT"
          echo "release_build_args=${release_build_args}" >> "$GITHUB_OUTPUT"

      - name: Build and Test
        run: |
          nix develop -c bash -lc '
            set -euo pipefail
            zig build ${{ steps.version.outputs.test_build_args }}
            zig build test ${{ steps.version.outputs.test_build_args }}
          '

      - name: Resolve Built Version
        id: built_version
        run: |
          release_version="$(nix develop -c ./zig-out/linux/spacecap --version)"
          if [ -z "$release_version" ]; then
            echo "Failed to read version from built binary" >&2
            exit 1
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Build Release Binaries
        run: nix develop -c zig build ${{ steps.version.outputs.release_build_args }} -Dappimage -Doptimize=ReleaseSafe

      - name: Package Linux Binary
        run: mv zig-out/linux/spacecap zig-out/linux/spacecap-linux-x86_64


      - name: Generate Checksums
        run: |
          sha256sum zig-out/linux/spacecap-linux-x86_64 > SHA256SUMS.txt
          sha256sum zig-out/linux/spacecap-linux-x86_64.AppImage >> SHA256SUMS.txt

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spacecap-release-assets
          path: |
            zig-out/linux/spacecap-linux-x86_64
            zig-out/linux/spacecap-linux-x86_64.AppImage
            SHA256SUMS.txt

      - name: Move Nightly Tag
        if: github.ref_type != 'tag'
        run: |
          git tag -f nightly "${GITHUB_SHA}"
          git push --force origin refs/tags/nightly

      - name: Check Existing Release
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.release_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete Existing Nightly Release
        if: github.ref_type != 'tag' && steps.existing_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ steps.version.outputs.release_tag }}" --yes

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.built_version.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: ${{ github.ref_type != 'tag' || steps.existing_release.outputs.exists != 'true' }}
          append_body: false
          files: |
            zig-out/linux/spacecap-linux-x86_64
            zig-out/linux/spacecap-linux-x86_64.AppImage
            SHA256SUMS.txt

      - name: Test Install Script
        env:
          EXPECTED_VERSION: ${{ steps.built_version.outputs.release_version }}
        run: |
          set -euo pipefail

          install_home="$(mktemp -d)"
          trap 'rm -rf "$install_home"' EXIT

          install_args=""
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            install_args="--nightly"
          fi

          for attempt in 1 2 3 4 5; do
            rm -rf "$install_home"
            mkdir -p "$install_home"
            install_path="$install_home/.local/bin/spacecap"

            if install_output="$(HOME="$install_home" APPIMAGE_EXTRACT_AND_RUN=1 sh ./install.sh $install_args)"; then
              echo "$install_output"
              expected_install_output="Installed spacecap version $EXPECTED_VERSION to $install_path."
              if ! printf '%s\n' "$install_output" | grep -Fqx "$expected_install_output"; then
                echo "Install output mismatch on attempt $attempt. Expected line: $expected_install_output" >&2
                continue
              fi

              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "install.sh did not install the expected version after $attempt attempts" >&2
              exit 1
            fi

            sleep 10
          done
